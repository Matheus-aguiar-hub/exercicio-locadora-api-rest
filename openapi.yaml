                example: 1
        idioma:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              tipo:
                type: string
                example: "Original"
        pessoa:
          type: array
          minItems: 1
          items:
            type: object
            properties:
