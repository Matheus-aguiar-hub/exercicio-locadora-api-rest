# =========================================
#               COMPONENTS
# =========================================

components:
  schemas:

    FilmeInput:
      type: object
      required:
        - nome
        - data_lancamento
        - duracao
        - sinopse
        - avaliacao
        - valor
        - capa
        - status_filme
        - id_classificacao_indicativa
        - id_produtora
        - genero
        - idioma
        - pessoa
      properties:
        nome:
          type: string
          maxLength: 80
          example: "Operação Tempestade de Aço"
        data_lancamento:
          type: string
          format: date
          example: "2025-03-20"
        duracao:
          type: string
          example: "02:05:00"
        sinopse:
          type: string
          example: "Um grupo de soldados de elite recebe uma missão impossível."
        avaliacao:
