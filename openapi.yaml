openapi: 3.0.3

info:
  title: Projeto Locadora de Filmes - Matheus Aguiar
  description: API-REST destinada para controlar Filmes, Produtoras, Pessoas e entidades relacionadas
  version: 1.1.0
  contact:
    name: Matheus Aguiar
    email: matheus.aguiar.work@gmail.com
  license:
    name: MIT

servers:
  - url: https://api-restful-locadora.onrender.com
    description: Ambiente de Produção
  - url: http://localhost:8080
    description: Ambiente Local

tags:
  - name: FILME
  - name: CLASSIFICACAO
  - name: GENERO
  - name: IDIOMA
  - name: NACIONALIDADE
  - name: SEXO
  - name: TIPO_TELEFONE
  - name: PRODUTORA
  - name: PESSOA

paths:

# =========================================
#                   FILME
# =========================================

  /v1/senai/locadora/filme:
    get:
      tags: [FILME]
      summary: Listar todos os filmes
      responses:
        '200':
          description: Lista de filmes retornada com sucesso
        '404':
          description: Nenhum filme encontrado
        '500':
          description: Erro interno no servidor

    post:
      tags: [FILME]
      summary: Inserir novo filme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilmeInput'
            example:
              nome: "Operação Tempestade de Aço"
              data_lancamento: "2025-03-20"
              duracao: "02:05:00"
              sinopse: "Um grupo de soldados de elite recebe uma missão impossível."
              avaliacao: "4.60"
              valor: "54.90"
              capa: "https://exemplo.com/capas/tempestade.jpg"
              trailer_url: "https://youtube.com/watch?v=temp003"
              status_filme: "Ativo"
              id_classificacao_indicativa: 3
              id_produtora: 3
              genero:
                - id: 2
                - id: 1
              idioma:
                - id: 1
                  tipo: "Original"
                - id: 2
                  tipo: "Dublado"
              pessoa:
                - id: 2
                  funcao: "Ator"
                - id: 1
                  funcao: "Dublador"
      responses:
        '201':
          description: Filme inserido com sucesso
        '400':
          description: Dados inválidos no body
        '415':
          description: Content-Type inválido (esperado application/json)
        '500':
          description: Erro interno no servidor

  /v1/senai/locadora/filme/{id}:
    get:
      tags: [FILME]
      summary: Buscar filme por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Filme encontrado
        '400':
          description: ID inválido
        '404':
          description: Filme não encontrado
        '500':
          description: Erro interno no servidor

    put:
      tags: [FILME]
      summary: Atualizar filme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilmeInput'
      responses:
        '200':
          description: Filme atualizado com sucesso
        '400':
          description: Dados inválidos
        '404':
          description: Filme não encontrado
        '415':
          description: Content-Type inválido
        '500':
          description: Erro interno no servidor

    delete:
      tags: [FILME]
      summary: Excluir filme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Filme excluído com sucesso
        '400':
          description: ID inválido
        '404':
          description: Filme não encontrado
        '500':
          description: Erro interno no servidor

