                type: string
                maxLength: 30
                example: "Ator"

    Classificacao:
      type: object
      required: [nome, descricao, sigla, idade_minima]
      properties:
        nome:
          type: string
          example: "Livre"
        descricao:
          type: string
          example: "Conteúdo adequado para todas as idades"
        sigla:
          type: string
          example: "L"
        idade_minima:
          type: integer
          example: 0

    Genero:
      type: object
      required: [tipo, descricao]
      properties:
        tipo:
          type: string
          maxLength: 30
          example: "Ação"
        descricao:
          type: string
          example: "Filmes com muita adrenalina e combates"

    Idioma:
      type: object
      required: [nome, sigla]
      properties:
        nome:
          type: string
          maxLength: 100
          example: "Português"
        sigla:
          type: string
          maxLength: 8
          example: "PT-BR"

    Sexo:
      type: object
      required: [nome, sigla]
      properties:
        nome:
          type: string
          example: "Masculino"
        sigla:
          type: string
          example: "M"

    Nacionalidade:
      type: object
      required: [nome_pais]
      properties:
        nome_pais:
          type: string
          example: "Brasil"

    TipoTelefone:
      type: object
      required: [tipo]
      properties:
