components:

  schemas:

    Filme:
      type: object
      properties:
        nome:
          type: string
        sinopse:
          type: string
        data_lancamento:
          type: string
        duracao:
          type: string
        valor:
          type: number
        avaliacao:
          type: number
        capa:
          type: string

    Classificacao:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: string
        sigla:
          type: string
        idade_minima:
          type: integer

    Estado:
      type: object
      properties:
        sigla:
          type: string
        nome:
          type: string

    Genero:
      type: object
      properties:
        tipo:
          type: string
        descricao:
          type: string

    Idioma:
      type: object
      properties:
        nome:
          type: string
        sigla:
          type: string

    Nacionalidade:
      type: object
      properties:
        nome_pais:
          type: string

    TipoTelefone:
      type: object
      properties:
        tipo:
          type: string