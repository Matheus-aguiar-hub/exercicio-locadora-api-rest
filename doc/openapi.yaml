# =========================================

components:

  schemas:

    Filme:
      type: object
      properties:
        nome:
          type: string
        data_lancamento:
          type: date  
        duracao:
          type: time
        sinopse:
          type: text
        avaliacao:
          type: number
        valor:
          type: number
        capa:
          type: string
        trailer_url:
          type: string
        status_filme:
          type: string
        id_classificacao_indicativa:
          type: number

    Classificacao:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: text
        sigla:
          type: string
        idade_minima:
          type: string

    Genero:
      type: object
      properties:
        tipo:
          type: string
        descricao:
          type: text

    Idioma:
      type: object
      properties:
        nome:
          type: string
        sigla:
          type: string

    Sexo:
      type: object
      properties:
        nome:
          type: string
        sigla:
          type: string

    Nacionalidade:
      type: object
      properties:
        nome_pais:
          type: string

    TipoTelefone:
      type: object
      properties:
        tipo:
          type: string

    Produtora:
      type: object
      properties:
        nome_fantasia:
          type: string
        cnpj:
          type: string
        razao_social:
          type: string
        website:
          type: string
        data_inicio:
          type: date
        status_produtora:
          type: string
        email:
          type: string