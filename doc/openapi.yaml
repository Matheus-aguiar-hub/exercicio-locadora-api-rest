
openapi: 3.0.3

info:
  title: Projeto do Filmes DS2M - Matheus Aguiar
  description: API destinada para controlar Filmes
  version: 1.0.4.26

servers:
  - url: http://localhost:8080

paths:

# =========================================
#                   FILME
# =========================================

  /v1/senai/locadora/filme:
    get:
      tags:
        - FILME
      summary: Listar filmes
      responses:
        '200':
          description: Lista de filmes

    post:
      tags:
        - FILME
      summary: Inserir filme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Filme'
      responses:
        '201':
          description: Filme criado

  /v1/senai/locadora/filme/{id}:
    get:
      tags:
        - FILME
      summary: Buscar filme por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Filme encontrado

    put:
      tags:
        - FILME
      summary: Atualizar filme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Filme'
      responses:
        '200':
          description: Filme atualizado

    delete:
      tags:
        - FILME
      summary: Excluir filme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Filme excluído

